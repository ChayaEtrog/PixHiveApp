<!-- home.component.html -->
<div class="background-container">
    <div class="button-container">
        <button mat-raised-button class="contained-btn" (click)="isLogInOpen=true">LOGIN</button>
      <button mat-stroked-button class="outlined-btn" (click)="isRegisterOpen=true">SIGNUP</button>
    </div>
  </div>

@if(isLogInOpen){
    <app-login-form></app-login-form>
}  

@if(isRegisterOpen){ 
    <app-register-form></app-register-form>
}
