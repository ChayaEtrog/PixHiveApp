@if(userAuth.isLoggedIn()){
<mat-toolbar class="custom-toolbar">
    <mat-toolbar-row>
  
      <mat-icon class="home" routerLink="/home" routerLinkActive="active-button">
        home
      </mat-icon>
  
      <nav class="nav-container">
        <button mat-button routerLink="/users" routerLinkActive="active-button" aria-current="page" style="color: #274354e0;">
          Users
        </button>

        <button mat-button routerLink="/messages" routerLinkActive="active-button" aria-current="page" style="color: #274354e0;">
          Messages
        </button>

        <button mat-button routerLink="/user-growth" routerLinkActive="active-button" aria-current="page" style="color: #274354e0;">
          user growth
        </button>
      </nav>
  
      <div>
        <app-user-auth></app-user-auth>
      </div>
  
    </mat-toolbar-row>
  </mat-toolbar>
    
    <router-outlet></router-outlet>
}

@else{
  <app-home></app-home>
}
