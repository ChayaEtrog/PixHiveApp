  <div class="user-list">
    <div class="card-container">
      @for (user of users; track $index) {
      <mat-card  class="user-card" (click)="goToDetails(user.id)">
        <mat-card-content>
          <h3>{{ user.userName }}</h3>
          <p>ID: {{ user.id }}</p>
        </mat-card-content>
      </mat-card>
    }
    </div>
  </div>
  <button (click)="addUser=!addUser">add user</button>

  @if(addUser){
    <app-add-user (closeForm)="closeAddUser()"></app-add-user>
  }
